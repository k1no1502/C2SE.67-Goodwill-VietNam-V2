<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #06B6D4 0%, #22d3ee 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
        }
        
        .error-container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .maintenance-illustration {
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            animation: bounce 2.5s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(135deg, #06B6D4 0%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin: 20px 0;
            text-shadow: none;
        }
        
        .error-title {
            font-size: 32px;
            font-weight: 700;
            color: #212529;
            margin: 20px 0;
        }
        
        .error-text {
            font-size: 16px;
            color: #6c757d;
            margin: 20px 0;
            line-height: 1.6;
        }
        
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            padding: 12px 40px;
            background: linear-gradient(135deg, #06B6D4 0%, #22d3ee 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(30, 144, 255, 0.3);
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(30, 144, 255, 0.4);
            color: white;
        }

        @media (max-width: 600px) {
            .error-container {
                padding: 40px 20px;
            }

            .error-code {
                font-size: 80px;
            }

            .error-title {
                font-size: 24px;
            }

            .error-text {
                font-size: 14px;
            }

            .maintenance-illustration svg {
                width: 150px !important;
                height: 150px !important;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="maintenance-illustration">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width: 200px; height: 200px;">
                <!-- Worker body -->
                <circle cx="100" cy="50" r="20" fill="#f4a460"/>
                <!-- Head band -->
                <rect x="80" y="35" width="40" height="8" fill="#ff6b6b" rx="4"/>
                <!-- Body -->
                <rect x="85" y="75" width="30" height="40" fill="#4a90e2" rx="5"/>
                <!-- Arms -->
                <rect x="65" y="80" width="20" height="12" fill="#f4a460" rx="6"/>
                <rect x="115" y="80" width="20" height="12" fill="#f4a460" rx="6"/>
                <!-- Wrench in hand -->
                <g transform="translate(135, 75)">
                    <rect x="0" y="0" width="30" height="6" fill="#888" rx="3"/>
                    <circle cx="28" cy="3" r="6" fill="#888"/>
                </g>
                <!-- Legs -->
                <rect x="90" y="115" width="8" height="25" fill="#333" rx="4"/>
                <rect x="102" y="115" width="8" height="25" fill="#333" rx="4"/>
                <!-- Shoes -->
                <ellipse cx="94" cy="142" rx="8" ry="6" fill="#666"/>
                <ellipse cx="106" cy="142" rx="8" ry="6" fill="#666"/>
                <!-- Tool belt -->
                <rect x="80" y="110" width="40" height="8" fill="#8b7355"/>
            </svg>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">Trang đang được bảo trì</h1>
        <p class="error-text">
            Rất tiếc, trang bạn đang tìm kiếm không tồn tại hoặc đang được bảo trì. 
            <br>Hãy quay lại trang chủ để tiếp tục.
        </p>
        <a href="./" class="btn-home">
            <i class="bi bi-house-door"></i> Về trang chủ
        </a>
    </div>
</body>
</html>
